spring:
  application:
    name: notes-service
  datasource:
    url: jdbc:h2:mem:notesdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    open-in-view: false

server:
  port: 8080
